spring:
  datasource:
    url: jdbc:h2:mem:examdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: true
      path: /h2-console

jwt:
  secret: change-me-to-a-long-random-string-at-least-32-bytes-long-please
  expiration-ms: 3600000